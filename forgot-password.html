<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — AuthSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode" title="Toggle dark mode">
    <i class="bi bi-moon-fill" id="themeIcon"></i>
  </button>

  <main class="auth-page">
    <div class="auth-card">

      <div class="brand-icon" aria-hidden="true"><i class="bi bi-envelope-open-fill"></i></div>
      <p class="card-eyebrow">AuthSystem</p>
      <h1 class="card-title">Forgot password?</h1>
      <p class="card-subtitle">Enter your email and we'll send you a reset link</p>

      <!-- Success state (hidden by default) -->
      <div id="successState" class="success-state d-none">
        <div class="success-icon"><i class="bi bi-check-circle-fill"></i></div>
        <p class="success-title">Check your inbox</p>
        <p class="success-desc">
          We've sent a password reset link to your email address.
          It may take a minute to arrive.
        </p>
        <a href="reset-password.html" class="btn-auth" style="width:auto; padding:.65rem 1.75rem;">
          <i class="bi bi-arrow-right me-1" aria-hidden="true"></i>Continue to Reset
        </a>
      </div>

      <!-- Form -->
      <form id="forgotForm" novalidate>

        <div class="mb-4">
          <label for="email" class="form-label">Email address</label>
          <div class="input-wrap">
            <input type="email" class="form-control" id="email"
              placeholder="you@example.com" autocomplete="email" required />
            <i class="bi bi-envelope input-icon" aria-hidden="true"></i>
          </div>
          <div class="invalid-feedback">Please enter a valid email address.</div>
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">
          <span id="submitTxt">Send Reset Link</span>
          <span id="submitSpin" class="spinner-border d-none" role="status" aria-hidden="true"></span>
        </button>

      </form>

      <div class="text-center mt-3">
        <a href="index.html" style="font-size:.875rem; font-weight:500;">
          <i class="bi bi-arrow-left me-1" aria-hidden="true"></i>Back to Login
        </a>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* Dark mode */
    const html = document.documentElement;
    const applyTheme = t => {
      html.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      document.getElementById('themeIcon').className =
        t === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    };
    applyTheme(localStorage.getItem('theme') || 'light');
    document.getElementById('themeBtn').addEventListener('click', () =>
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

    /* Form submit */
    document.getElementById('forgotForm').addEventListener('submit', e => {
      e.preventDefault();
      const em = document.getElementById('email');
      em.classList.remove('is-invalid','is-valid');

      if (!em.value || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em.value)) {
        em.classList.add('is-invalid'); return;
      }
      em.classList.add('is-valid');

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      document.getElementById('submitTxt').textContent = 'Sending…';
      document.getElementById('submitSpin').classList.remove('d-none');

      setTimeout(() => {
        document.getElementById('forgotForm').classList.add('d-none');
        document.getElementById('successState').classList.remove('d-none');
      }, 1500);
    });
  </script>
</body>
</html>
