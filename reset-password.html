<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — AuthSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode" title="Toggle dark mode">
    <i class="bi bi-moon-fill" id="themeIcon"></i>
  </button>

  <main class="auth-page">
    <div class="auth-card">

      <div class="brand-icon" aria-hidden="true"><i class="bi bi-key-fill"></i></div>
      <p class="card-eyebrow">AuthSystem</p>
      <h1 class="card-title">Reset password</h1>
      <p class="card-subtitle">Choose a strong new password for your account</p>

      <form id="resetForm" novalidate>

        <!-- New Password -->
        <div class="mb-3">
          <label for="newPw" class="form-label">New Password</label>
          <div class="input-group">
            <div class="input-wrap flex-grow-1">
              <input type="password" class="form-control" id="newPw"
                placeholder="Min. 8 characters" autocomplete="new-password" required
                style="border-radius:var(--radius-input) 0 0 var(--radius-input);" />
              <i class="bi bi-lock input-icon" aria-hidden="true"></i>
            </div>
            <button class="btn-eye" type="button" id="toggleNew" tabindex="-1" aria-label="Show or hide new password">
              <i class="bi bi-eye" id="eyeNew"></i>
            </button>
          </div>
          <!-- Strength bar -->
          <div class="strength-bar" aria-hidden="true">
            <div class="strength-seg" id="s1"></div>
            <div class="strength-seg" id="s2"></div>
            <div class="strength-seg" id="s3"></div>
            <div class="strength-seg" id="s4"></div>
          </div>
          <div class="strength-text" id="strTxt" style="color:var(--clr-muted);">Enter a password</div>
          <div class="invalid-feedback" id="newPwErr">Password must be at least 8 characters.</div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
          <label for="cpw" class="form-label">Confirm New Password</label>
          <div class="input-group">
            <div class="input-wrap flex-grow-1">
              <input type="password" class="form-control" id="cpw"
                placeholder="Repeat your new password" autocomplete="new-password" required
                style="border-radius:var(--radius-input) 0 0 var(--radius-input);" />
              <i class="bi bi-lock input-icon" aria-hidden="true"></i>
            </div>
            <button class="btn-eye" type="button" id="toggleCpw" tabindex="-1" aria-label="Show or hide confirm password">
              <i class="bi bi-eye" id="eyeCpw"></i>
            </button>
          </div>
          <div class="invalid-feedback" id="cpwErr">Passwords do not match.</div>
        </div>

        <!-- Requirements checklist -->
        <ul class="req-grid mb-4" aria-label="Password requirements">
          <li id="r-len">  <i class="bi bi-x-circle"></i> 8+ characters</li>
          <li id="r-upper"><i class="bi bi-x-circle"></i> Uppercase letter</li>
          <li id="r-num">  <i class="bi bi-x-circle"></i> Number</li>
          <li id="r-spec"> <i class="bi bi-x-circle"></i> Special character</li>
        </ul>

        <button type="submit" class="btn-auth" id="resetBtn">
          <span id="resetTxt">Update Password</span>
          <span id="resetSpin" class="spinner-border d-none" role="status" aria-hidden="true"></span>
        </button>

      </form>

      <div class="text-center mt-3">
        <a href="index.html" style="font-size:.875rem; font-weight:500;">
          <i class="bi bi-arrow-left me-1" aria-hidden="true"></i>Back to Login
        </a>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* Dark mode */
    const html = document.documentElement;
    const applyTheme = t => {
      html.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      document.getElementById('themeIcon').className =
        t === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    };
    applyTheme(localStorage.getItem('theme') || 'light');
    document.getElementById('themeBtn').addEventListener('click', () =>
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

    /* Show/hide helpers */
    function mkToggle(btnId, inpId, icId) {
      document.getElementById(btnId).addEventListener('click', () => {
        const inp = document.getElementById(inpId);
        const ic  = document.getElementById(icId);
        const s   = inp.type === 'password';
        inp.type  = s ? 'text' : 'password';
        ic.className = s ? 'bi bi-eye-slash' : 'bi bi-eye';
      });
    }
    mkToggle('toggleNew', 'newPw', 'eyeNew');
    mkToggle('toggleCpw', 'cpw',   'eyeCpw');

    /* Password strength + requirements */
    const segs   = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
    const strTxt = document.getElementById('strTxt');
    const levels = [
      { cls:'weak',   color:'#ef4444', text:'Weak — too short' },
      { cls:'fair',   color:'#f59e0b', text:'Fair' },
      { cls:'good',   color:'#06b6d4', text:'Good' },
      { cls:'strong', color:'#10b981', text:'Strong' },
    ];

    function setReq(id, met) {
      const el  = document.getElementById(id);
      const txt = el.textContent.trim().replace(/^\S+\s/,'');
      el.className = met ? 'met' : '';
      el.innerHTML = met
        ? `<i class="bi bi-check-circle-fill"></i> ${txt}`
        : `<i class="bi bi-x-circle"></i> ${txt}`;
    }

    document.getElementById('newPw').addEventListener('input', function () {
      const v = this.value;
      const c = [v.length>=8, /[A-Z]/.test(v), /[0-9]/.test(v), /[^A-Za-z0-9]/.test(v)];
      const score = c.filter(Boolean).length;

      segs.forEach((s,i) => {
        s.className = 'strength-seg';
        if (i < score) s.classList.add(levels[score-1].cls);
      });
      strTxt.textContent = v ? (levels[score-1]?.text || 'Weak') : 'Enter a password';
      strTxt.style.color = v ? (levels[score-1]?.color || '#ef4444') : 'var(--clr-muted)';

      setReq('r-len',   c[0]);
      setReq('r-upper', c[1]);
      setReq('r-num',   c[2]);
      setReq('r-spec',  c[3]);
    });

    /* Form submit */
    document.getElementById('resetForm').addEventListener('submit', e => {
      e.preventDefault();
      const pw  = document.getElementById('newPw');
      const cpw = document.getElementById('cpw');
      let ok = true;

      pw.classList.remove('is-invalid','is-valid');
      cpw.classList.remove('is-invalid','is-valid');

      if (!pw.value || pw.value.length < 8) {
        pw.classList.add('is-invalid');
        document.getElementById('newPwErr').textContent = 'Password must be at least 8 characters.';
        ok = false;
      } else pw.classList.add('is-valid');

      if (!cpw.value || cpw.value !== pw.value) {
        cpw.classList.add('is-invalid');
        document.getElementById('cpwErr').textContent =
          !cpw.value ? 'Please confirm your password.' : 'Passwords do not match.';
        ok = false;
      } else cpw.classList.add('is-valid');

      if (!ok) return;

      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      document.getElementById('resetTxt').textContent = 'Updating…';
      document.getElementById('resetSpin').classList.remove('d-none');
      setTimeout(() => { window.location.href = 'index.html'; }, 1500);
    });
  </script>
</body>
</html>
